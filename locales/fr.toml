# Page Tables
tables_heading = "Répertoire des tables"
tables_desc = "Sélectionnez le répertoire contenant vos tables VPX (un dossier par table)."
tables_structure = "Arborescence attendue (folder-per-table Visual Pinball 10.8) :"
tables_structure_tree = """
Tables/
└── Nom de Table/
    ├── Nom de Table.vpx              <- fichier de table (requis)
    ├── Nom de Table.directb2s        <- backglass B2S (optionnel)
    ├── Nom de Table.ini              <- surcharges par table (optionnel)
    ├── Nom de Table.vbs              <- patch VBS / override script (optionnel)
    ├── altsound/<rom>/               <- pack altsound (optionnel)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- ROM PinMAME (requise pour tables à ROM)
    │   └── nvram/<rom>.nv            <- sauvegarde (auto-créée)
    ├── pupvideos/<rom>/              <- vidéos PinUp Player (optionnel)
    ├── serum/<rom>/<rom>.crz         <- colorisation DMD Serum (optionnel)
    ├── vni/<rom>/<rom>.vni + .pal    <- colorisation DMD VNI (optionnel)
    └── medias/                       <- médias frontend (optionnel)"""
tables_formats_supported = "ℹ Formats de colorisation DMD supportés : Serum (.crz) et VNI (.vni + .pal)."
