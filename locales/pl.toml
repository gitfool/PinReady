tables_structure_tree = """
Tables/
└── Table Name/
    ├── Table Name.vpx                <- plik stołu (wymagany)
    ├── Table Name.directb2s          <- backglass B2S (opcjonalnie)
    ├── Table Name.ini                <- nadpisania dla stołu (opcjonalnie)
    ├── Table Name.vbs                <- patch VBS / nadpisanie skryptu (opcjonalnie)
    ├── altsound/<rom>/               <- pakiet altsound (opcjonalnie)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME ROM (wymagany dla stołów z ROM)
    │   └── nvram/<rom>.nv            <- dane zapisu (tworzone automatycznie)
    ├── pupvideos/<rom>/              <- filmy PinUp Player (opcjonalnie)
    ├── serum/<rom>/<rom>.crz         <- kolorowanie DMD Serum (opcjonalnie)
    ├── vni/<rom>/<rom>.vni + .pal    <- kolorowanie DMD VNI (opcjonalnie)
    └── medias/                       <- media frontendu (opcjonalnie)"""
