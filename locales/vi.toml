tables_structure_tree = """
Tables/
└── Table Name/
    ├── Table Name.vpx                <- tệp bàn (bắt buộc)
    ├── Table Name.directb2s          <- backglass B2S (tùy chọn)
    ├── media/launcher.png            <- ghi đè hình thu nhỏ của launcher (tùy chọn, .png/.webp/.jpg/.jpeg)
    ├── Table Name.ini                <- ghi đè theo bàn (tùy chọn)
    ├── Table Name.vbs                <- patch VBS / ghi đè script (tùy chọn)
    ├── altsound/<rom>/               <- gói altsound (tùy chọn)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME ROM (bắt buộc cho bàn có ROM)
    │   └── nvram/<rom>.nv            <- dữ liệu lưu (tự động tạo)
    ├── pupvideos/<rom>/              <- video PinUp Player (tùy chọn)
    ├── serum/<rom>/<rom>.crz         <- tô màu DMD Serum (tùy chọn)
    ├── vni/<rom>/<rom>.vni + .pal    <- tô màu DMD VNI (tùy chọn)
    └── medias/                       <- media frontend (tùy chọn)"""
