# Rebuild button + VBS patch explainer (tables page)
tables_rebuild_title = "زر إعادة البناء (في مشغّل الطاولات)"
tables_rebuild_desc = "انقر لمسح جميع صور الخلفية المخزنة وحالة ترقيع VBS، ثم إعادة فحص مجلد الطاولات من الصفر. استخدم هذا عندما يبدو PinReady غير متزامن مع قرصك — بعد إعادة تنظيم الطاولات، أو لاستلام ترقيع jsm174 المنشور حديثًا."
tables_vbs_patch_title = "توافق Visual Pinball Standalone"
tables_vbs_patch_desc = "تستخدم بعض الطاولات واجهات VBScript خاصة بـ Windows فقط تتعطل على إصدار Linux/macOS من Standalone. عند تفعيل الخيار أدناه، يحسب PinReady بصمة نص VBS المضمن في كل طاولة أثناء الفحص — وعندما يوفر مشروع المجتمع jsm174/vpx-standalone-scripts ترقيعًا له — يُثبِّت النص المرقَّع كملف .vbs بجانب ملف .vpx."
tables_vbs_patch_toggle = "تطبيق ترقيعات VBS تلقائيًا من jsm174/vpx-standalone-scripts"
tables_vbs_patch_backup = "إذا كان لديك ملف <table>.vbs مخصص خاص بك، فسيتم الاحتفاظ به باسم <table>.pre_standalone.vbs (لن يُحمِّل VPX هذا الاسم تلقائيًا) قبل تطبيق الترقيع — طاولة تعمل، مع حفظ نصك القديم بأمان. معطَّل افتراضيًا: يحتوي الكتالوج أحيانًا على ترقيعات تُسبب مشاكل لبعض الطاولات، فعِّله بوعي."

