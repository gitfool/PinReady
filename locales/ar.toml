tables_heading = "مجلد الطاولات"
tables_desc = "اختر المجلد الذي يحتوي طاولات VPX (مجلد لكل طاولة)."
tables_structure = "التنظيم المتوقع (مجلد لكل طاولة Visual Pinball 10.8):"
tables_structure_tree = """
Tables/
└── Table Name/
    ├── Table Name.vpx                <- ملف الطاولة (مطلوب)
    ├── Table Name.directb2s          <- backglass B2S (اختياري)
    ├── media/launcher.png            <- تجاوز صورة مصغرة للمشغّل (اختياري، .png/.webp/.jpg/.jpeg)
    ├── Table Name.ini                <- تجاوزات لكل طاولة (اختياري)
    ├── Table Name.vbs                <- VBS patch / تجاوز السكربت (اختياري)
    ├── altsound/<rom>/               <- حزمة altsound (اختياري)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME ROM (مطلوب لطاولات ROM)
    │   └── nvram/<rom>.nv            <- بيانات الحفظ (تُنشأ تلقائياً)
    ├── pupvideos/<rom>/              <- فيديوهات PinUp Player (اختياري)
    ├── serum/<rom>/<rom>.crz         <- تلوين DMD بصيغة Serum (اختياري)
    ├── vni/<rom>/<rom>.vni + .pal    <- تلوين DMD بصيغة VNI (اختياري)
    └── medias/                       <- وسائط الواجهة (اختياري)"""
