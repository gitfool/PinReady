# Tables page
tables_heading = "Tischverzeichnis"
tables_desc = "Wählen Sie das Verzeichnis mit Ihren VPX-Tischen (ein Ordner pro Tisch)."
tables_structure = "Erwartete Struktur (Ordner pro Tisch, Visual Pinball 10.8):"
tables_structure_tree = """
Tables/
└── Table Name/
    ├── Table Name.vpx                <- Tischdatei (erforderlich)
    ├── Table Name.directb2s          <- Backglass B2S (optional)
    ├── media/launcher.png            <- Launcher-Miniatur-Override (optional, .png/.webp/.jpg/.jpeg)
    ├── Table Name.ini                <- Tisch-spezifische Overrides (optional)
    ├── Table Name.vbs                <- VBS-Patch / Script-Override (optional)
    ├── altsound/<rom>/               <- altsound-Paket (optional)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME-ROM (erforderlich für ROM-Tische)
    │   └── nvram/<rom>.nv            <- Speicherdaten (automatisch erzeugt)
    ├── pupvideos/<rom>/              <- PinUp Player-Videos (optional)
    ├── serum/<rom>/<rom>.crz         <- Serum DMD-Kolorierung (optional)
    ├── vni/<rom>/<rom>.vni + .pal    <- VNI DMD-Kolorierung (optional)
    └── medias/                       <- Frontend-Medien (optional)"""
tables_formats_supported = "ℹ Unterstützte DMD-Kolorierungsformate: Serum (.crz) und VNI (.vni + .pal)."
tables_formats_unsupported = " => Proprietäre Formate wie .pac werden nicht unterstützt."
