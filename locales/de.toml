# Rebuild button + VBS patch explainer (tables page)
tables_rebuild_title = "Schaltfläche „Neu aufbauen“ (im Tabellen-Launcher)"
tables_rebuild_desc = "Klicken Sie, um alle gecachten Backglass-Bilder und den VBS-Patch-Status zu löschen und das Tabellenverzeichnis von Grund auf neu zu scannen. Verwenden Sie dies, wenn PinReady nicht mehr mit Ihrer Festplatte synchron zu sein scheint — nach dem Neuorganisieren von Tabellen oder um einen frisch veröffentlichten jsm174-Patch zu übernehmen."
tables_vbs_patch_title = "Visual Pinball Standalone Kompatibilität"
tables_vbs_patch_desc = "Einige Tabellen verwenden Windows-spezifische VBScript-APIs, die auf dem Linux/macOS Standalone-Build nicht funktionieren. Wenn die untenstehende Option aktiviert ist, erstellt PinReady beim Scannen einen Fingerabdruck des eingebetteten VBS jeder Tabelle und — wenn das Community-Projekt jsm174/vpx-standalone-scripts einen Patch dafür hat — installiert das gepatchte Skript als .vbs-Sidecar neben der .vpx-Datei."
tables_vbs_patch_toggle = "VBS-Patches von jsm174/vpx-standalone-scripts automatisch anwenden"
tables_vbs_patch_backup = "Wenn Sie Ihre eigene angepasste <table>.vbs-Sidecar-Datei hatten, wird sie vor dem Anwenden des Patches als <table>.pre_standalone.vbs gesichert (VPX lädt diesen Dateinamen nicht automatisch) — eine funktionierende Tabelle, mit Ihrem alten Skript sicher gesichert. Standardmäßig deaktiviert: Der Katalog enthält gelegentlich Patches, die bestimmte Tabellen beeinträchtigen, aktivieren Sie die Option daher bewusst."

