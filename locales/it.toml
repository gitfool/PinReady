# Tables page
tables_heading = "Directory dei tavoli"
tables_desc = "Seleziona la directory contenente i tuoi tavoli VPX (una cartella per tavolo)."
tables_structure = "Struttura prevista (cartella per tavolo Visual Pinball 10.8):"
tables_structure_tree = """
Tables/
└── Table Name/
    ├── Table Name.vpx                <- file tavolo (obbligatorio)
    ├── Table Name.directb2s          <- backglass B2S (opzionale)
    ├── Table Name.ini                <- override per tavolo (opzionale)
    ├── Table Name.vbs                <- patch VBS / override script (opzionale)
    ├── altsound/<rom>/               <- pacchetto altsound (opzionale)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- ROM PinMAME (obbligatoria per tavoli ROM)
    │   └── nvram/<rom>.nv            <- dati salvataggio (auto-creato)
    ├── pupvideos/<rom>/              <- video PinUp Player (opzionale)
    ├── serum/<rom>/<rom>.crz         <- colorazione DMD Serum (opzionale)
    ├── vni/<rom>/<rom>.vni + .pal    <- colorazione DMD VNI (opzionale)
    └── medias/                       <- media frontend (opzionale)"""
tables_formats_supported = "ℹ Formati di colorazione DMD supportati: Serum (.crz) e VNI (.vni + .pal)."
tables_formats_unsupported = " => Formati proprietari come .pac non sono supportati."
