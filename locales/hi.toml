outputs_heading = "आउटपुट / DOF कॉन्फ़िगरेशन"
outputs_desc = "VPX 10.8.1 standalone libdof को मूल रूप से एकीकृत करता है — किसी बाहरी प्लगइन को इंस्टॉल करने की आवश्यकता नहीं। आपको बस अपने कैबिनेट के हार्डवेयर (सोलेनॉइड, LED, मोटर...) का वर्णन करने वाला DOF कॉन्फ़िगरेशन प्रदान करना है। इसे बनाने के लिए VPUniverse ऑनलाइन जनरेटर का उपयोग करें, फिर परिणाम को नीचे दिए गए फ़ोल्डर में निकालें।"
