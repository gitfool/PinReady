# Tables page
tables_heading = "Tafelmap"
tables_desc = "Selecteer de map met uw VPX-tafels (één map per tafel)."
tables_structure = "Verwachte structuur (map per tafel, Visual Pinball 10.8):"
tables_structure_tree = """
Tables/
└── Table Name/
    ├── Table Name.vpx                <- tafelbestand (vereist)
    ├── Table Name.directb2s          <- backglass B2S (optioneel)
    ├── Table Name.ini                <- per-tafel overrides (optioneel)
    ├── Table Name.vbs                <- VBS-patch / script-override (optioneel)
    ├── altsound/<rom>/               <- altsound-pakket (optioneel)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME-ROM (vereist voor ROM-tafels)
    │   └── nvram/<rom>.nv            <- opgeslagen gegevens (automatisch)
    ├── pupvideos/<rom>/              <- PinUp Player-video's (optioneel)
    ├── serum/<rom>/<rom>.crz         <- Serum DMD-kleuring (optioneel)
    ├── vni/<rom>/<rom>.vni + .pal    <- VNI DMD-kleuring (optioneel)
    └── medias/                       <- frontend-media (optioneel)"""
