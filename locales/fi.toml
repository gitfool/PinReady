    ├── media/launcher.png            <- launcherin pikkukuvan ohitus (valinnainen, .png/.webp/.jpg/.jpeg)
    ├── Table Name.ini                <- pöytäkohtaiset asetukset (valinnainen)
    ├── Table Name.vbs                <- VBS-paikka / skriptin ohitus (valinnainen)
    ├── altsound/<rom>/               <- altsound-paketti (valinnainen)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME ROM (pakollinen ROM-pöydille)
    │   └── nvram/<rom>.nv            <- tallennustiedot (luodaan automaattisesti)
    ├── pupvideos/<rom>/              <- PinUp Player -videot (valinnainen)
    ├── serum/<rom>/<rom>.crz         <- Serum DMD -värjäys (valinnainen)
    ├── vni/<rom>/<rom>.vni + .pal    <- VNI DMD -värjäys (valinnainen)
    └── medias/                       <- frontend-media (valinnainen)"""
