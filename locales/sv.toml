# Tables page
tables_heading = "Bordkatalog"
tables_desc = "Välj katalogen som innehåller dina VPX-bord (en mapp per bord)."
tables_structure = "Förväntad struktur (mapp per bord, Visual Pinball 10.8):"
tables_structure_tree = """
Tables/
└── Table Name/
    ├── Table Name.vpx                <- bordfil (obligatorisk)
    ├── Table Name.directb2s          <- backglass B2S (valfri)
    ├── media/launcher.png            <- överskrivning av launcher-miniatyr (valfri, .png/.webp/.jpg/.jpeg)
    ├── Table Name.ini                <- bordspecifika överskrivningar (valfri)
    ├── Table Name.vbs                <- VBS-patch / scriptöverskrivning (valfri)
    ├── altsound/<rom>/               <- altsound-paket (valfri)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME-ROM (obligatorisk för ROM-bord)
    │   └── nvram/<rom>.nv            <- sparad data (skapas automatiskt)
    ├── pupvideos/<rom>/              <- PinUp Player-videor (valfri)
    ├── serum/<rom>/<rom>.crz         <- Serum DMD-färgläggning (valfri)
    ├── vni/<rom>/<rom>.vni + .pal    <- VNI DMD-färgläggning (valfri)
    └── medias/                       <- frontend-media (valfri)"""
