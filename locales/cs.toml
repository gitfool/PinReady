# Tables page
tables_heading = "Adresář stolů"
tables_desc = "Vyberte adresář obsahující vaše VPX stoly (jedna složka na stůl)."
tables_structure = "Očekávaná struktura (složka na stůl, Visual Pinball 10.8):"
tables_structure_tree = """
Tables/
└── Table Name/
    ├── Table Name.vpx                <- soubor stolu (povinný)
    ├── Table Name.directb2s          <- backglass B2S (volitelný)
    ├── Table Name.ini                <- přepisy pro stůl (volitelné)
    ├── Table Name.vbs                <- patch VBS / přepis skriptu (volitelné)
    ├── altsound/<rom>/               <- balíček altsound (volitelný)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME ROM (povinný pro ROM stoly)
    │   └── nvram/<rom>.nv            <- data uložení (vytvořeno automaticky)
    ├── pupvideos/<rom>/              <- videa PinUp Player (volitelné)
    ├── serum/<rom>/<rom>.crz         <- kolorování DMD Serum (volitelné)
    ├── vni/<rom>/<rom>.vni + .pal    <- kolorování DMD VNI (volitelné)
    └── medias/                       <- frontendová média (volitelné)"""
