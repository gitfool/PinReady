tables_structure_tree = """
Tables/
└── Table Name/
    ├── Table Name.vpx                <- soubor stolu (povinný)
    ├── Table Name.directb2s          <- backglass B2S (volitelný)
    ├── media/launcher.png            <- přepis miniatury launcheru (volitelné, .png/.webp/.jpg/.jpeg)
