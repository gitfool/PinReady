    ├── Table Name.vbs                <- patch VBS / přepis skriptu (volitelné)
    ├── altsound/<rom>/               <- balíček altsound (volitelný)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME ROM (povinný pro ROM stoly)
