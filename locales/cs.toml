    ├── serum/<rom>/<rom>.crz         <- kolorování DMD Serum (volitelné)
    ├── vni/<rom>/<rom>.vni + .pal    <- kolorování DMD VNI (volitelné)
    └── medias/                       <- frontendová média (volitelné)"""
