# Tables page
tables_heading = "테이블 디렉토리"
tables_desc = "VPX 테이블이 있는 디렉토리를 선택하세요 (테이블당 폴더 하나)."
tables_structure = "예상 레이아웃 (Visual Pinball 10.8 폴더 단위):"
tables_structure_tree = """
Tables/
└── Table Name/
    ├── Table Name.vpx                <- 테이블 파일 (필수)
    ├── Table Name.directb2s          <- 백글라스 B2S (선택)
    ├── Table Name.ini                <- 테이블별 오버라이드 (선택)
    ├── Table Name.vbs                <- VBS 패치 / 스크립트 오버라이드 (선택)
    ├── altsound/<rom>/               <- altsound 팩 (선택)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME ROM (ROM 테이블에 필수)
    │   └── nvram/<rom>.nv            <- 저장 데이터 (자동 생성)
