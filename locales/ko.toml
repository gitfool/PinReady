tables_vbs_patch_backup = "자체적으로 커스터마이즈한 <table>.vbs 사이드카가 있었다면, 패치 적용 전에 <table>.pre_standalone.vbs로 보존됩니다 (VPX는 해당 파일 이름을 자동으로 로드하지 않습니다) — 작동하는 테이블과 안전하게 백업된 원본 스크립트를 모두 유지할 수 있습니다. 기본값은 꺼짐: 카탈로그에는 특정 테이블에 회귀를 일으키는 패치가 간혹 포함되므로, 의도적으로 활성화하세요."

