tables_structure_tree = """
Tables/
└── Table Name/
    ├── Table Name.vpx                <- テーブルファイル（必須）
    ├── Table Name.directb2s          <- バックグラス B2S（オプション）
    ├── Table Name.ini                <- テーブル別オーバーライド（オプション）
    ├── Table Name.vbs                <- VBS パッチ / スクリプトオーバーライド（オプション）
    ├── altsound/<rom>/               <- altsound パック（オプション）
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME ROM（ROM テーブルに必須）
    │   └── nvram/<rom>.nv            <- セーブデータ（自動作成）
    ├── pupvideos/<rom>/              <- PinUp Player 動画（オプション）
    ├── serum/<rom>/<rom>.crz         <- Serum DMD カラー化（オプション）
    ├── vni/<rom>/<rom>.vni + .pal    <- VNI DMD カラー化（オプション）
    └── medias/                       <- フロントエンドメディア（オプション）"""
