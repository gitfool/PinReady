# Tables page
tables_heading = "Tables directory"
tables_desc = "Select the directory containing your VPX tables (one folder per table)."
tables_structure = "Expected layout (folder-per-table Visual Pinball 10.8):"
tables_structure_tree = """
Tables/
└── Table Name/
    ├── Table Name.vpx                <- table file (required)
    ├── Table Name.directb2s          <- backglass B2S (optional)
    ├── media/launcher.png            <- launcher thumbnail override (optional, .png/.webp/.jpg/.jpeg)
    ├── Table Name.ini                <- per-table overrides (optional)
    ├── Table Name.vbs                <- VBS patch / script override (optional)
    ├── altsound/<rom>/               <- altsound pack (optional)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME ROM (required for ROM tables)
    │   └── nvram/<rom>.nv            <- save data (auto-created)
    ├── pupvideos/<rom>/              <- PinUp Player videos (optional)
    ├── serum/<rom>/<rom>.crz         <- Serum DMD colorization (optional)
    ├── vni/<rom>/<rom>.vni + .pal    <- VNI DMD colorization (optional)
    └── medias/                       <- frontend media (optional)"""
tables_formats_supported = "ℹ Supported DMD colorization formats: Serum (.crz) and VNI (.vni + .pal)."
tables_formats_unsupported = " => Proprietary formats like .pac are not supported."
