    ├── Table Name.directb2s          <- backglass B2S (hiari)
    ├── media/launcher.png            <- ubatilishaji wa kijipicha cha launcher (hiari, .png/.webp/.jpg/.jpeg)
    ├── Table Name.ini                <- ubatilishaji kwa meza (hiari)
    ├── Table Name.vbs                <- VBS patch / ubatilishaji wa skripti (hiari)
    ├── altsound/<rom>/               <- pakiti ya altsound (hiari)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME ROM (inahitajika kwa meza za ROM)
    │   └── nvram/<rom>.nv            <- data ya kuhifadhi (hutengenezwa kiotomatiki)
    ├── pupvideos/<rom>/              <- video za PinUp Player (hiari)
    ├── serum/<rom>/<rom>.crz         <- upakaji rangi wa DMD Serum (hiari)
    ├── vni/<rom>/<rom>.vni + .pal    <- upakaji rangi wa DMD VNI (hiari)
    └── medias/                       <- vyombo vya habari vya frontend (hiari)"""
