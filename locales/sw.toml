tables_vbs_patch_backup = "Ikiwa ulikuwa na faili yako mwenyewe ya kubinafsishwa ya <table>.vbs, huhifadhiwa kama <table>.pre_standalone.vbs (VPX haitapakia jina hilo la faili kiotomatiki) kabla ya kiraka kutumika — meza inayofanya kazi, na hati yako ya zamani iliyohifadhiwa salama. Imezimwa kwa chaguo-msingi: katalogi wakati mwingine ina viraka vinavyosababisha matatizo kwa meza fulani, kwa hivyo washa chaguo hili kwa ufahamu."

