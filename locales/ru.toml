tables_vbs_patch_title = "Совместимость с Visual Pinball Standalone"
tables_vbs_patch_desc = "Некоторые столы используют Windows-специфичные API VBScript, которые не работают в Linux/macOS-сборке Standalone. Когда включена указанная ниже опция, PinReady во время сканирования вычисляет отпечаток встроенного VBS каждого стола и — если у общественного проекта jsm174/vpx-standalone-scripts есть патч для него — устанавливает исправленный скрипт в виде файла .vbs рядом с файлом .vpx."
