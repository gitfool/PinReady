tables_rebuild_title = "পুনর্নির্মাণ বোতাম (টেবিল লঞ্চারে)"
tables_rebuild_desc = "প্রতিটি ক্যাশে করা ব্যাকগ্লাস ছবি এবং VBS-প্যাচ অবস্থা মুছতে ক্লিক করুন, তারপর টেবিল ডিরেক্টরি নতুন করে স্ক্যান করুন। যখন PinReady আপনার ডিস্কের সাথে সিঙ্ক থাকে না বলে মনে হয় তখন এটি ব্যবহার করুন — টেবিল পুনর্বিন্যাস করার পরে, বা সদ্য প্রকাশিত jsm174 প্যাচ গ্রহণ করতে।"
tables_vbs_patch_title = "Visual Pinball Standalone সামঞ্জস্যতা"
tables_vbs_patch_desc = "কিছু টেবিল Windows-এর জন্য বিশেষ VBScript API ব্যবহার করে যা Linux/macOS Standalone বিল্ডে কাজ করে না। নিচের বিকল্পটি সক্রিয় থাকলে, PinReady স্ক্যান করার সময় প্রতিটি টেবিলের এম্বেডেড VBS-এর ফিঙ্গারপ্রিন্ট তৈরি করে এবং — যখন কমিউনিটি প্রকল্প jsm174/vpx-standalone-scripts-এ এর জন্য একটি প্যাচ থাকে — .vpx ফাইলের পাশে একটি .vbs সাইডকার হিসাবে প্যাচ করা স্ক্রিপ্ট ইনস্টল করে।"
tables_vbs_patch_toggle = "jsm174/vpx-standalone-scripts থেকে স্বয়ংক্রিয়ভাবে VBS প্যাচ প্রয়োগ করুন"
tables_vbs_patch_backup = "যদি আপনার নিজস্ব কাস্টমাইজড <table>.vbs সাইডকার থাকে, প্যাচ প্রয়োগ করার আগে এটি <table>.pre_standalone.vbs হিসাবে সংরক্ষিত হয় (VPX এই ফাইলের নাম স্বয়ংক্রিয়ভাবে লোড করবে না) — একটি কার্যকর টেবিল, আপনার পুরানো স্ক্রিপ্ট নিরাপদে ব্যাকআপ সহ। ডিফল্টভাবে বন্ধ: ক্যাটালগে মাঝে মাঝে এমন প্যাচ থাকে যা নির্দিষ্ট টেবিলের সমস্যা তৈরি করে, তাই সচেতনভাবে এটি সক্রিয় করুন।"

