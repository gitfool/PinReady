    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME ROM (ROM টেবিলের জন্য আবশ্যক)
    │   └── nvram/<rom>.nv            <- সংরক্ষিত ডেটা (স্বয়ংক্রিয়ভাবে তৈরি)
    ├── pupvideos/<rom>/              <- PinUp Player ভিডিও (ঐচ্ছিক)
    ├── serum/<rom>/<rom>.crz         <- Serum DMD রঙিন (ঐচ্ছিক)
    ├── vni/<rom>/<rom>.vni + .pal    <- VNI DMD রঙিন (ঐচ্ছিক)
    └── medias/                       <- frontend মিডিয়া (ঐচ্ছিক)"""
