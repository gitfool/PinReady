Tables/
└── Table Name/
    ├── Table Name.vpx                <- súbor stola (povinný)
    ├── Table Name.directb2s          <- backglass B2S (voliteľný)
    ├── media/launcher.png            <- prepis miniatúry launchera (voliteľné, .png/.webp/.jpg/.jpeg)
