name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev \
            libasound2-dev libpulse-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxtst-dev libxss-dev libwayland-dev wayland-protocols \
            libdbus-1-dev libdrm-dev libgbm-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --release -- -D warnings

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            label: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev \
            libasound2-dev libpulse-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxtst-dev libxss-dev libwayland-dev wayland-protocols \
            libdbus-1-dev libdrm-dev libgbm-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev

      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV
          echo "CFLAGS=-mmacosx-version-min=11.0" >> $GITHUB_ENV
          echo "CXXFLAGS=-mmacosx-version-min=11.0" >> $GITHUB_ENV
          # SDL3 Objective-C files use @available() which emits calls to
          # ___isPlatformVersionAtLeast from libclang_rt. Find and link it.
          CLANG_RT_DIR=$(clang --print-search-dirs | grep libraries | sed 's/libraries: =//;s/:.*//')
          CLANG_RT_LIB=$(find "$CLANG_RT_DIR" -name 'libclang_rt.osx.a' 2>/dev/null | head -1)
          if [ -n "$CLANG_RT_LIB" ]; then
            echo "RUSTFLAGS=-C link-arg=$CLANG_RT_LIB" >> $GITHUB_ENV
            echo "Found clang_rt: $CLANG_RT_LIB"
          else
            echo "Warning: libclang_rt.osx.a not found"
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ runner.os == 'Windows' && '--features win-icon' || '' }}

      - name: Run tests
        if: matrix.target != 'x86_64-apple-darwin'
        run: cargo test

      # --- Apple signing & notarization ---
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SIGN_ID="Developer ID Application: Sylvain Gargasson ($APPLE_TEAM_ID)"
          codesign --force --options runtime \
            --sign "$SIGN_ID" \
            --timestamp \
            target/${{ matrix.target }}/release/pinready

      - name: Notarize binary (macOS, tags only)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent \
            target/${{ matrix.target }}/release/pinready \
            $RUNNER_TEMP/pinready.zip

          # Submit and poll with timeout + retry (3 attempts, 5/15/45 min backoff)
          notarize_once() {
            local zip="$1" label="$2" timeout="$3"

            local output
            output=$(xcrun notarytool submit "$zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --verbose 2>&1)
            echo "$output"
            local sub_id
            sub_id=$(echo "$output" | awk '/id:/{print $2; exit}')
            [ -n "$sub_id" ] || { echo "$label: failed to get submission ID"; return 1; }
            echo "$label: submitted (id: $sub_id)"

            local deadline=$((SECONDS + timeout))
            while [ $SECONDS -lt $deadline ]; do
              sleep 30
              local info
              info=$(xcrun notarytool info "$sub_id" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" 2>&1) || { echo "$label: network error, retrying poll..."; continue; }

              local status
              status=$(echo "$info" | awk '/status:/{print $2; exit}')
              echo "$label: $status"

              case "$status" in
                Accepted) return 0 ;;
                Invalid|Rejected)
                  xcrun notarytool log "$sub_id" \
                    --apple-id "$APPLE_ID" \
                    --password "$APPLE_ID_PASSWORD" \
                    --team-id "$APPLE_TEAM_ID" 2>&1 || true
                  return 1 ;;
              esac
            done
            echo "$label: timed out after $((timeout / 60)) minutes"
            return 2  # timeout, retryable
          }

          notarize() {
            local zip="$1" label="$2"
            local backoffs=(300 900 2700)  # 5 / 15 / 45 minutes
            for i in 0 1 2; do
              echo "$label: attempt $((i + 1))/3"
              notarize_once "$zip" "$label" "${backoffs[$i]}" && return 0
              local rc=$?
              [ $rc -eq 2 ] || return $rc  # only retry on timeout (rc=2)
              [ $i -lt 2 ] && echo "$label: retrying after timeout..."
            done
            return 1
          }

          notarize "$RUNNER_TEMP/pinready.zip" "PinReady"

      # --- Package ---
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf pinready-${{ matrix.label }}.tar.gz -C target/${{ matrix.target }}/release pinready

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/pinready.exe -DestinationPath pinready-${{ matrix.label }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: pinready-${{ matrix.label }}
          path: pinready-${{ matrix.label }}.*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
